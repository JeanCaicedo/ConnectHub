name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend:
    name: Backend (.NET)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore backend/ConnectHub.Tests/ConnectHub.Tests.csproj

      - name: Build
        run: dotnet build backend/ConnectHub.Tests/ConnectHub.Tests.csproj --configuration Release --no-restore

      - name: Test
        run: dotnet test backend/ConnectHub.Tests/ConnectHub.Tests.csproj --configuration Release --no-build

  frontend:
    name: Frontend (Angular)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/connecthub-web
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/connecthub-web/package-lock.json

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build -- --configuration production
